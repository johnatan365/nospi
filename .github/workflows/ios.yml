name: iOS Build & TestFlight

on:
  push:
    tags:
      - 'build-*'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install certificates and provisioning profile
        env:
          CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          security create-keychain -p "build123" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "build123" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERT_P12" | base64 --decode > dist-cert.p12
          security import dist-cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "build123" build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision

          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Build iOS app
        run: |
          npx expo prebuild --platform ios --clean
          cd ios
          xcodebuild -workspace Nospi.xcworkspace \
            -scheme Nospi \
            -configuration Release \
            -archivePath $RUNNER_TEMP/nospi.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=9VF922X4K7 \
            PROVISIONING_PROFILE=${{ env.PROFILE_UUID }} \
            CODE_SIGN_IDENTITY="iPhone Distribution"

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF2
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>9VF922X4K7</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.anonymous.nospi</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>iPhone Distribution</string>
          </dict>
          </plist>
          EOF2

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/nospi.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          AUTHKEY_P8: ${{ secrets.IOS_AUTHKEY_P8 }}
          AUTHKEY_ID: ${{ secrets.IOS_AUTHKEY_ID }}
          ISSUER_ID: ${{ secrets.IOS_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$AUTHKEY_P8" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${AUTHKEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${AUTHKEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/Nospi.ipa" \
            --apiKey "${AUTHKEY_ID}" \
            --apiIssuer "${ISSUER_ID}" \
            --show-progress
